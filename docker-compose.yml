# OpenClaw — TrueNAS Scale docker-compose
# Place this file on your TrueNAS system (e.g. /mnt/pool/apps/openclaw/)
# Secrets are loaded from /mnt/files01/enc1/openclaw.env (chmod 600, owned by root).
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f openclaw

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped

    user: "3004:3004"

    # Port mapping lives here (openclaw owns the network namespace).
    # nginx in the proxy service listens on 18790 in this same namespace,
    # so Docker forwards host:18789 → container:18790 → nginx → 127.0.0.1:18789.
    ports:
      - "18789:18790"

    env_file:
      - /mnt/files01/enc1/openclaw.env

    environment:
      HOME: /home/node

      # ── Control UI origin ─────────────────────────────────────────────────
      # Allow connections from any origin. Safe because token auth (below)
      # is the actual security gate — this just satisfies the CSRF origin check.
      OPENCLAW_GATEWAY_ALLOWED_ORIGINS: "*"

      # ── Security (non-secret, hardcoded) ──────────────────────────────────
      # Require token auth on every request.
      OPENCLAW_AUTH_MODE: token

      # Disable agent shell / filesystem / browser tools unless you need them.
      # Re-enable selectively in openclaw.json once you understand the risk.
      OPENCLAW_TOOL_POLICY: deny-exec,deny-fs-write,deny-browser

    volumes:
      # Host paths should be ZFS datasets on your TrueNAS pool.
      # Ensure correct ownership (run once on TrueNAS host):
      #   chown -R 3004:3004 /mnt/files01/enc1/openclaw-config /mnt/files01/enc1/openclaw-workspace
      #   chmod 700 /mnt/files01/enc1/openclaw-config
      - ${OPENCLAW_CONFIG_PATH:-/mnt/files01/enc1/openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_PATH:-/mnt/files01/enc1/openclaw-workspace}:/home/node/.openclaw/workspace

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    # ── Resource limits (TrueNAS recommended minimums) ──────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M
        reservations:
          memory: 512M

    # ── Security hardening ──────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false   # config dir must be writable; tighten per-subpath if needed

    # Do NOT mount the Docker socket unless you have explicitly reviewed the
    # implications — it grants root-equivalent access to the TrueNAS host.
    # Uncomment only if an extension explicitly requires it:
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro

  proxy:
    image: nginx:alpine
    container_name: openclaw-proxy
    restart: unless-stopped

    # Share openclaw's network namespace so nginx can reach 127.0.0.1:18789
    # (openclaw only binds to loopback due to an upstream bug).
    network_mode: "service:openclaw"

    # Write an nginx config inline — no mounted file needed.
    # $$ becomes $ after Docker Compose variable substitution; inside the
    # single-quoted echo argument the shell leaves them literal, so nginx
    # receives them as its own variables ($http_upgrade, $host).
    command: >-
      sh -c "echo 'server{listen 18790;location /{proxy_pass http://127.0.0.1:18789;proxy_http_version 1.1;proxy_set_header Upgrade $$http_upgrade;proxy_set_header Connection upgrade;proxy_set_header Host $$host;proxy_read_timeout 86400s;}}' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

    depends_on:
      openclaw:
        condition: service_healthy

networks:
  default:
    driver: bridge
    # Isolate from other Docker networks on the host.
    internal: false
